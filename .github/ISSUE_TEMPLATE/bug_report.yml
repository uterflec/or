name: Bug report
description: Report a reproducible problem with or
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please provide a minimal reproduction and remove secrets from all logs and examples.

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - llm
        - agent
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: or version
      placeholder: v0.2.0
    validations:
      required: true

  - type: input
    id: go-version
    attributes:
      label: Go version
      description: Output of `go version`
      placeholder: go version go1.24.0 darwin/arm64
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, architecture, and model provider
      placeholder: macOS 15, arm64, DeepSeek
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest Go program that reproduces the problem.
      render: go
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Include relevant output with API keys, prompts, and personal data removed.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed secrets and sensitive data from this report.
          required: true
