name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve or. Describe the problem first so the proposed API can be evaluated in context.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - llm
        - agent
        - New package
        - Documentation
        - Repository tooling
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case or limitation should this feature address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or API you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative designs have you considered?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, links, or other context that may help evaluate the request.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions for similar requests.
          required: true
        - label: This request describes one focused capability.
          required: true
