site_name: or
site_description: A modular Go toolkit for building applications with language models and higher-level agents.
site_url: https://ktsoator.github.io/or/
repo_url: https://github.com/ktsoator/or
repo_name: ktsoator/or
copyright: Copyright &copy; ktsoator

docs_dir: docs

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 简体中文
          build: true
          nav_translations:
            Home: 首页
            LLM: LLM
            Basics: 入门
            Core: 核心
            Advanced: 进阶
            Overview: 概述
            Getting started: 快速开始
            Providers and models: 提供方与模型
            Streaming: 流式响应
            Tools: 工具
            Reasoning: 推理与思考
            Reading responses: 读取响应
            Conversations: 对话
            Configuration: 请求配置
            Custom protocols: 自定义协议
            Agent: Agent
            Events and state: 事件与状态
            Steering and follow-ups: 引导与追加
            Lifecycle hooks: 生命周期钩子
            Messages and custom types: 消息与自定义类型
            The run-loop engine: 运行循环引擎
            Internals: 源码解析
            Foundations: 基础概念
            Execution: 运行机制
            Architecture overview: 架构总览
            Models and protocols: 模型与协议
            Message types: 消息类型系统
            Protocol adapters: 协议适配器
            Streaming internals: 流式机制
            Switching models: 模型切换
            Notes: 笔记

theme:
  name: material
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
    logo: material/infinity
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

nav:
  - Home: index.md
  - LLM:
      - Basics:
          - Overview: llm/README.md
          - Getting started: llm/getting-started.md
          - Providers and models: llm/providers.md
      - Core:
          - Streaming: llm/streaming.md
          - Tools: llm/tools.md
          - Reasoning: llm/reasoning.md
          - Reading responses: llm/results.md
      - Advanced:
          - Conversations: llm/conversations.md
          - Configuration: llm/configuration.md
          - Custom protocols: llm/extending.md
  - Agent:
      - Basics:
          - Overview: agent/README.md
          - Getting started: agent/getting-started.md
          - Tools: agent/tools.md
      - Core:
          - Events and state: agent/events.md
          - Steering and follow-ups: agent/steering.md
          - Lifecycle hooks: agent/hooks.md
      - Advanced:
          - Messages and custom types: agent/messages.md
          - Configuration: agent/configuration.md
          - The run-loop engine: agent/loop.md
  - Internals:
      - LLM:
          - Architecture overview: internals/overview.md
          - Foundations:
              - Models and protocols: internals/models.md
              - Message types: internals/messages.md
          - Execution:
              - Protocol adapters: internals/adapters.md
              - Streaming internals: internals/streaming.md
              - Switching models: internals/transform.md
  - Notes:
      - Overview: notes/README.md
